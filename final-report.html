<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Report - Matthew McWilliams</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Matthew McWilliams Logo">
        <h1>Matthew McWilliams</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="wwr/index.html">WWR</a>
            <a href="ice.html">ICE</a>
            <a href="about.html">About Me</a>
            <a href="final-report.html">Final Report</a>
        </nav>
    </header>

    <section>
        <h2>Final Report</h2>
        <p>Final Report for Web Fundamentals (WDD130). Covers all four final project websites.</p>
    </section>

    <details class="dclient">
        <summary>Client</summary>
    </details>

    <details class="dlead">
        <summary>Lead Dev</summary>
    </details>

    <details class="djunior">
        <summary>Junior Dev</summary>
    </details>

    <details class="dreflection">
        <summary>Reflection</summary>
    </details>

    <footer>
        <p>Matthew McWilliams | WDD 130</p>
    </footer>

    <script>
        var allDetails = document.querySelectorAll('details');

        var phases = [0, 1/6, 1/3, 0.5];
        var duration = 10;

        allDetails.forEach(function(detail, i) {
            var summary = detail.querySelector('summary');
            var hovered = false;
            var t = 0;
            var startPos = 0;

            detail.addEventListener('mouseenter', function() { hovered = true; });
            detail.addEventListener('mouseleave', function() { hovered = false; });

            function getWavePosition(maxPos) {
                var time = Date.now() / 1000;
                var cycle = ((time / duration) + phases[i]) % 1;
                var triangle = cycle < 0.5 ? cycle * 2 : 2 - cycle * 2;
                return triangle * maxPos;
            }

            function animate() {
                var containerWidth = detail.clientWidth;
                var maxPos = containerWidth - 200;
                var shouldExpand = hovered || detail.open;
                var position = getWavePosition(maxPos);

                if (shouldExpand) {
                    if (t === 0) startPos = position;
                    t = t + (1 - t) * 0.15;
                    if (t > 0.999) t = 1;
                } else if (t > 0) {
                    t = t * 0.85;
                    if (t < 0.001) t = 0;
                    startPos = startPos + (position - startPos) * 0.08;
                }

                if (t > 0) {
                    summary.style.marginLeft = (startPos * (1 - t)) + 'px';
                    summary.style.width = (200 + (containerWidth - 200) * t) + 'px';
                } else {
                    summary.style.marginLeft = position + 'px';
                    summary.style.width = '200px';
                }

                requestAnimationFrame(animate);
            }

            animate();
        });
    </script>
</body>
</html>
