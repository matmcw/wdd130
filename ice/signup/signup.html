<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #formContainer {
            width: 400px;
            margin: 50px auto;
            border: 10px solid darkblue;
            border-radius: 30px;
            overflow: hidden;
            background-color: white;
            position: relative;
            box-shadow: 10px 10px 30px rgba(0, 0, 0, 0.7);
        }

        #closeBtn {
            position: absolute;
            top: 10px;
            left: 10px;
        }

        #form-header {
            background-image: url('images/jesus_feeds_5000.jpeg');
            background-size: cover;
            background-position: top;
            padding: 75px 0 30px 0;
            text-align: center;
            color: white;
            text-shadow: 4px 4px 4px black;
        }

        #myForm {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }

        h3 {
            text-align: center;
            padding: 20px 0 5px 0;
        }

        .checkbox, #submit-button {
            grid-column: 1/3;
            text-align: center;
        }

        .book-container {
            display: flex;
            justify-content: space-between;
        }

        .book-image {
            width: 19.5%;
        }

        /* Turns input box or text red if the input is not yet valid and green if it is*/
        input:invalid {
            border: 2px solid red;
        }

        input:valid {
            border: 2px solid lightgreen;
        }

        /* Uses some form of ancient magic to select the labels for the multiple choice and checkbox inputs. ChatGPT told me to do it like this. */
        input[type="radio"]:invalid + label, input[type="checkbox"]:invalid + label {
            color: red;
        }

        input[type="radio"]:valid + label, input[type="checkbox"]:valid + label {
            color: green;
        }

    </style>

</head>

<body>
    <div id="formContainer">
        <div id="form-header">
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            <button type="button" id="closeBtn">X</button>
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section class="checkbox">
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section class="checkbox">
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section id="submit-button">
                <button type="submit">Submit</button>
            </section>
        </form>

        <div class="book-container">
            <img class="book-image" src="images/old_testament.webp">
            <img class="book-image" src="images/new_testament.webp">
            <img class="book-image" src="images/book_of_mormon.webp">
            <img class="book-image" src="images/doctrine_and_covenants.webp">
            <img class="book-image" src="images/pearl_of_great_price.webp">
        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
